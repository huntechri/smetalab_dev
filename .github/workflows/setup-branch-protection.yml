name: Setup Branch Protection

on:
  workflow_dispatch:

jobs:
  apply-branch-protection:
    name: Apply Branch Protection Ruleset
    runs-on: ubuntu-latest
    permissions:
      administration: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply full main-protection ruleset via Rulesets API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          RULESET_FILE=".github/rulesets/main-protection.json"
          API_BASE="/repos/${OWNER}/${REPO}/rulesets"

          echo "Repository : ${OWNER}/${REPO}"
          echo "Ruleset    : ${RULESET_FILE}"
          echo ""

          echo "Step 1: Check for an existing 'main-protection' ruleset..."
          EXISTING_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_BASE}" \
            | jq -r '.[] | select(.name == "main-protection") | .id' 2>/dev/null || true)

          PAYLOAD=$(cat "$RULESET_FILE")

          if [ -n "$EXISTING_ID" ]; then
            echo "Found existing ruleset id=${EXISTING_ID}. Updating..."
            echo "$PAYLOAD" | gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_BASE}/${EXISTING_ID}" \
              --input - \
              | jq '{id, name, enforcement, target}'
          else
            echo "No existing ruleset found. Creating..."
            echo "$PAYLOAD" | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_BASE}" \
              --input - \
              | jq '{id, name, enforcement, target}'
          fi

          echo ""
          echo "Done. Full 'main-protection' ruleset has been applied:"
          echo "  - At least 1 approving review required before merging."
          echo "  - Stale approvals dismissed when new commits are pushed."
          echo "  - The person who pushed the last commit cannot self-approve."
          echo "  - Code owner review required."
          echo "  - 'All Checks Passed' CI status check required."
          echo "  - Deletion and force-push blocked on main/master."

      - name: Verify ruleset was applied
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/verify-branch-protection.sh
          ./scripts/verify-branch-protection.sh "${OWNER}/${REPO}"

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Source Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      src: ${{ steps.filter.outputs.src }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for source file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # "src" is true when any file that affects the Next.js build changes.
            # Non-source files (docs, markdown, test snapshots, etc.) are excluded
            # so that the build, lint, and type-check jobs are skipped on doc-only pushes.
            src:
              # Next.js app directory
              - 'app/**'
              # UI component library
              - 'components/**'
              # Domain entities
              - 'entities/**'
              # Feature modules
              - 'features/**'
              # Shared utilities and helpers
              - 'lib/**'
              - 'shared/**'
              # Monorepo packages
              - 'packages/**'
              # Root-level TypeScript/JavaScript source files
              - '*.ts'
              - '*.tsx'
              - '*.js'
              - '*.mjs'
              - '*.mts'
              # Build configuration files
              - 'next.config.*'
              - 'tsconfig*.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'eslint.config.*'
              - 'drizzle.config.*'
              - 'vitest.config.*'
              - 'playwright.config.*'
              # Dependency manifests
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'packages/*/package.json'
              - 'pnpm-workspace.yaml'
              # This workflow itself
              - '.github/workflows/ci.yml'
              - '.github/actions/**'

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [install, changes]
    if: needs.changes.outputs.src == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Run ESLint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Run type-check
        run: pnpm type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run tests
        run: pnpm test

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/junit.xml
          retention-days: 30

  validate-codeowners:
    name: Validate CODEOWNERS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate CODEOWNERS syntax and owners
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/validate-codeowners.sh .github/CODEOWNERS

  notify-build-failure:
    name: Notify Build Failure
    runs-on: ubuntu-latest
    needs: [build]
    if: failure() && needs.build.result == 'failure'
    permissions:
      contents: read

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Build failed* on `${{ github.repository }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Build failed* on `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`> by ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failing run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  ci:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [build, lint, type-check, test, validate-codeowners]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          # build, lint, and type-check may be legitimately skipped when only
          # non-source files changed (see the "changes" job for the path filters).
          # All other jobs must always succeed.
          BUILD_OK="${{ needs.build.result }}"
          LINT_OK="${{ needs.lint.result }}"
          TYPE_OK="${{ needs.type-check.result }}"
          TEST_OK="${{ needs.test.result }}"
          CODEOWNERS_OK="${{ needs.validate-codeowners.result }}"

          FAILED=false

          [[ "$BUILD_OK" == "success" || "$BUILD_OK" == "skipped" ]] || { echo "build: $BUILD_OK"; FAILED=true; }
          [[ "$LINT_OK" == "success" || "$LINT_OK" == "skipped" ]] || { echo "lint: $LINT_OK"; FAILED=true; }
          [[ "$TYPE_OK" == "success" || "$TYPE_OK" == "skipped" ]] || { echo "type-check: $TYPE_OK"; FAILED=true; }
          [[ "$TEST_OK" == "success" ]] || { echo "test: $TEST_OK"; FAILED=true; }
          [[ "$CODEOWNERS_OK" == "success" ]] || { echo "validate-codeowners: $CODEOWNERS_OK"; FAILED=true; }

          if [[ "$FAILED" == "true" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All checks passed."

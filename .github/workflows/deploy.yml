# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

permissions:
  contents: read
  deployments: write
  actions: read
  security-events: write
  pull-requests: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '23 5 * * 1'  # Weekly on Monday at 05:23 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Security Analysis ---
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check code scanning availability
      id: code_scanning
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        status=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/code-scanning/codeql/databases")

        if [ "$status" = "200" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Code scanning API is available."
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "Code scanning is unavailable (HTTP $status). Skipping CodeQL analysis upload."
        fi

    - name: Initialize CodeQL
      if: steps.code_scanning.outputs.enabled == 'true'
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Autobuild
      if: steps.code_scanning.outputs.enabled == 'true'
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      if: steps.code_scanning.outputs.enabled == 'true'
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"

    - name: Skip CodeQL summary
      if: steps.code_scanning.outputs.enabled != 'true'
      run: echo "Skipping CodeQL because code scanning is not enabled or API access is unavailable."

  trivy-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check code scanning availability
        id: code_scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/codeql/databases")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code scanning API is available."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning is unavailable (HTTP $status). SARIF upload will be skipped."
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy SARIF as artifact when code scanning is unavailable
        if: always() && steps.code_scanning.outputs.enabled != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-sarif
          path: trivy-results.sarif
          retention-days: 30

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run audit
        run: pnpm audit --audit-level moderate || echo "Audit found vulnerabilities, please review the report."
      - name: Check for updates
        run: pnpm outdated --format json > outdated.json || true
      - name: Upload report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: dependency-report
          path: outdated.json
          retention-days: 30

  ci:
    name: PR Gate (Lint + Typecheck + Unit)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Run Unit/Isolated Tests
        run: pnpm test

  integration-tests:
    name: Integration Tests (optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    continue-on-error: true
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      POSTGRES_URL: ${{ secrets.TEST_DATABASE_URL }}
      LOCAL_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      ALLOW_TEST_DB_CLEANUP: "true"
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      BASE_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET_TEST }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEND_API_KEY_TEST }}
      AUTH_TRUST_HOST: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration DB connectivity debug (temporary)
        run: |
          node <<'NODE'
          const net = require('node:net');

          const databaseUrl = process.env.DATABASE_URL?.trim();
          console.log(`DATABASE_URL set: ${databaseUrl ? 'yes' : 'no'}`);

          if (!databaseUrl) {
            process.exit(0);
          }

          let parsed;
          try {
            parsed = new URL(databaseUrl);
          } catch (error) {
            console.error('DATABASE_URL parse error:', error.message);
            process.exit(1);
          }

          const host = parsed.hostname;
          const port = Number(parsed.port || 5432);
          console.log(`DB host: ${host}`);
          console.log(`DB port: ${port}`);

          const socket = net.createConnection({ host, port, family: 4, timeout: 10000 });
          socket.on('connect', () => {
            console.log('TCP connect: success (IPv4)');
            socket.destroy();
          });
          socket.on('timeout', () => {
            console.log('TCP connect: timeout');
            socket.destroy();
          });
          socket.on('error', (error) => {
            console.log(`TCP connect: error code=${error.code ?? 'UNKNOWN'} message=${error.message}`);
            socket.destroy();
          });
          NODE

      - name: Prepare database
        run: |
          pnpm db:reset
          pnpm db:migrate
          pnpm db:seed

      - name: Run integration tests
        run: pnpm test:integration:force

  deploy-preview:
    name: Deploy to Vercel Preview
    needs: [ci]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: "preview"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview
        id: deploy_preview
        run: |
          set -ex
          vercel pull --yes --environment preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const previewUrl = `${{ steps.deploy_preview.outputs.preview_url }}`;
            const body = `✅ Vercel Preview готово: ${previewUrl}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  deploy-production:
    name: Deploy to Vercel Production
    needs: [codeql-analysis, trivy-scan, dependency-check, ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: "production"
      url: https://smetalabv3.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deployment
        run: |
          set -ex
          vercel pull --yes --environment production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

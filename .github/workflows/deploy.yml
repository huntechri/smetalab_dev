# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

permissions:
  contents: read
  deployments: write
  actions: read
  security-events: write
  pull-requests: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '23 5 * * 1'  # Weekly on Monday at 05:23 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Security Analysis ---
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"

  trivy-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run audit
        run: pnpm audit --audit-level moderate || echo "Audit found vulnerabilities, please review the report."
      - name: Check for updates
        run: pnpm outdated --format json > outdated.json || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-report
          path: outdated.json
          retention-days: 30

  ci:
    name: Quality Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)



    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      POSTGRES_URL: ${{ secrets.TEST_DATABASE_URL }}
      LOCAL_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      BASE_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET_TEST }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEND_API_KEY_TEST }}
      AUTH_TRUST_HOST: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          set -ex
          pnpm install --frozen-lockfile

      - name: Ensure database env
        run: |
          echo "Using Neon Test Branch for CI"
          echo "DATABASE_URL=${{ secrets.TEST_DATABASE_URL }}" >> "$GITHUB_ENV"
          echo "POSTGRES_URL=${{ secrets.TEST_DATABASE_URL }}" >> "$GITHUB_ENV"
          # LOCAL_DATABASE_URL is used in some scripts/configs
          echo "LOCAL_DATABASE_URL=${{ secrets.TEST_DATABASE_URL }}" >> "$GITHUB_ENV"



      - name: Database Migrations
        run: |
          set -ex
          pnpm db:migrate

      - name: Database Seeding
        run: |
          set -ex
          pnpm db:seed

      - name: Build and Type Check
        run: |
          set -ex
          pnpm build

      - name: Run Unit Tests
        run: |
          set -ex
          pnpm vitest run --dir __tests__/unit

      - name: Run Integration Tests
        run: |
          set -ex
          pnpm vitest run --dir __tests__/integration --maxWorkers=1

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: |
          set -ex
          npx playwright test
        env:
          CI: true


  deploy-preview:
    name: Deploy to Vercel Preview
    needs: [ci]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: "preview"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview
        id: deploy_preview
        run: |
          set -ex
          vercel pull --yes --environment preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `${{ steps.deploy_preview.outputs.preview_url }}`;
            const body = `✅ Vercel Preview готово: ${previewUrl}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  deploy-production:
    name: Deploy to Vercel Production
    needs: [codeql-analysis, trivy-scan, dependency-check, ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: "production"
      url: https://smetalabv3.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deployment
        run: |
          set -ex
          vercel pull --yes --environment production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

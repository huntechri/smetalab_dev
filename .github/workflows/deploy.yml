# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  VERCEL_ORG_ID: team_UMkcsMFIPYN0kuuw96Ytlm4q
  VERCEL_PROJECT_ID: prj_t39HsTOj40SuLwFunRf0njg1qz6M
  VERCEL_PROJECT_NAME: smetalabv3-timeweb

jobs:
  ci:
    name: PR Gate (Lint + Typecheck + Unit + Build)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Run Unit/Isolated Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  integration-tests:
    name: Integration Tests (optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    env:
      ALLOW_TEST_DB_CLEANUP: "true"
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      BASE_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST || secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST || secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_TEST || secrets.RESEND_API_KEY }}
      AUTH_TRUST_HOST: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Neon branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/test-${{ github.event.pull_request.number || github.sha }}
          username: neondb_owner
          database: neondb

      - name: Set DB URLs
        run: |
          echo "DATABASE_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> "$GITHUB_ENV"
          echo "POSTGRES_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> "$GITHUB_ENV"
          echo "LOCAL_DATABASE_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> "$GITHUB_ENV"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm db:reset
          pnpm db:migrate
          pnpm db:seed

      - name: Run integration tests
        id: run_integration_tests
        continue-on-error: true
        run: pnpm test:integration:force

      - name: Report integration test status
        if: always()
        run: |
          if [ "${{ steps.run_integration_tests.outcome }}" = "failure" ]; then
            echo "::warning::Optional integration tests failed. See this job logs for details."
          else
            echo "Optional integration tests passed."
          fi

      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/test-${{ github.event.pull_request.number || github.sha }}

  deploy-preview:
    name: Deploy to Vercel Preview (${{ env.VERCEL_PROJECT_NAME }})
    needs: [ci]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    environment:
      name: "preview"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Get Neon branch URL
        id: get_neon_branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}-${{ steps.branch_name.outputs.current_branch }}
          username: neondb_owner
          database: neondb

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview
        id: deploy_preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ steps.get_neon_branch.outputs.db_url_with_pooler }}
          POSTGRES_URL: ${{ steps.get_neon_branch.outputs.db_url_with_pooler }}
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          NEON_DB_URL="${{ steps.get_neon_branch.outputs.db_url_with_pooler }}"

          vercel pull --yes --environment preview --git-branch "$BRANCH_NAME" --token="$VERCEL_TOKEN"

          DATABASE_URL="$NEON_DB_URL" pnpm db:migrate
          DATABASE_URL="$NEON_DB_URL" pnpm db:seed:permissions

          ENV_FILE=".vercel/.env.preview.local"
          mkdir -p .vercel
          if [ -f "$ENV_FILE" ]; then
            sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${NEON_DB_URL}|" "$ENV_FILE"
            sed -i "s|^POSTGRES_URL=.*|POSTGRES_URL=${NEON_DB_URL}|" "$ENV_FILE"
            grep -q "^DATABASE_URL=" "$ENV_FILE" || echo "DATABASE_URL=${NEON_DB_URL}" >> "$ENV_FILE"
            grep -q "^POSTGRES_URL=" "$ENV_FILE" || echo "POSTGRES_URL=${NEON_DB_URL}" >> "$ENV_FILE"
          else
            printf "DATABASE_URL=%s\nPOSTGRES_URL=%s\n" "$NEON_DB_URL" "$NEON_DB_URL" > "$ENV_FILE"
          fi

          vercel build --target preview --token="$VERCEL_TOKEN"

          deploy_output=""
          deploy_exit_code=1
          PREVIEW_URL=""

          for attempt in 1 2 3; do
            set +e
            deploy_output=$(vercel deploy --prebuilt --target preview \
              -e DATABASE_URL="$NEON_DB_URL" \
              -e POSTGRES_URL="$NEON_DB_URL" \
              --token="$VERCEL_TOKEN" 2>&1)
            deploy_exit_code=$?
            set -e

            echo "$deploy_output"

            PREVIEW_URL=$(echo "$deploy_output" | awk '/^Preview: https:\/\// {print $2}' | tail -n 1)
            if [ -z "$PREVIEW_URL" ]; then
              PREVIEW_URL=$(echo "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.vercel\.app' | tail -n 1)
            fi

            if [ "$deploy_exit_code" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Vercel preview deploy failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done

          if [ "$deploy_exit_code" -ne 0 ]; then
            exit "$deploy_exit_code"
          fi

          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to parse preview URL from Vercel deploy output"
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const previewUrl = `${{ steps.deploy_preview.outputs.preview_url }}`;
            const body = `✅ Vercel Preview (${process.env.VERCEL_PROJECT_NAME}) готово: ${previewUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  migrate-production:
    name: Run Production Migrations
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: "production"
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.POSTGRES_URL }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL || secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate:prod

  deploy-production:
    name: Deploy to Vercel Production (${{ env.VERCEL_PROJECT_NAME }})
    needs: [ci, migrate-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: "production"
      url: https://smetalabv3-timeweb.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"

          for attempt in 1 2 3; do
            set +e
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
            deploy_exit_code=$?
            set -e

            if [ "$deploy_exit_code" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Vercel production deploy failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done

          if [ "$deploy_exit_code" -ne 0 ]; then
            exit "$deploy_exit_code"
          fi

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit
        run: pnpm audit --audit-level high

      - name: Check for updates
        run: pnpm outdated --format json > outdated.json || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-report
          path: outdated.json
          retention-days: 30

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check code scanning availability
        id: code_scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/codeql/databases")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code scanning API is available."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning is unavailable (HTTP $status). Skipping CodeQL analysis upload."
          fi

      - name: Initialize CodeQL
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - name: Skip CodeQL summary
        if: steps.code_scanning.outputs.enabled != 'true'
        run: echo "Skipping CodeQL because code scanning is not enabled or API access is unavailable."

  trivy-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check code scanning availability
        id: code_scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/codeql/databases")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code scanning API is available."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning is unavailable (HTTP $status). SARIF upload will be skipped."
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy SARIF as artifact when code scanning is unavailable
        if: always() && steps.code_scanning.outputs.enabled != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-sarif
          path: trivy-results.sarif
          retention-days: 30

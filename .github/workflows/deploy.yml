# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  NEXT_TELEMETRY_DISABLED: 1
  VERCEL_ORG_ID: team_UMkcsMFIPYN0kuuw96Ytlm4q
  VERCEL_PROJECT_ID: prj_t39HsTOj40SuLwFunRf0njg1qz6M

jobs:
  ci:
    name: PR Gate (Lint + Typecheck + UI Audit + Unit + Build)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.{js,jsx,ts,tsx,json,css,scss,mdx}') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type Check
        run: pnpm type-check
      - name: UI Audit
        run: pnpm audit:ui
      - name: Run Unit/Isolated Tests
        run: pnpm test
      - name: Build
        run: pnpm build

  integration-tests:
    name: Integration Tests (local Postgres, optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smetalab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smetalab_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ALLOW_TEST_DB_CLEANUP: "true"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smetalab_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smetalab_test
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/smetalab_test
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smetalab_test
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      BASE_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST || secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST || secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_TEST || secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_TEST || secrets.RESEND_API_KEY }}
      AUTH_TRUST_HOST: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare database
        run: |
          pnpm db:reset
          pnpm db:migrate
          pnpm db:seed
      - name: Run integration tests
        id: run_integration_tests
        continue-on-error: true
        run: pnpm test:integration:force
      - name: Report integration test status
        if: always()
        run: |
          if [ "${{ steps.run_integration_tests.outcome }}" = "failure" ]; then
            echo "::warning::Optional integration tests failed. See this job logs for details."
          else
            echo "Optional integration tests passed."
          fi

  deploy-preview:
    name: Deploy to Vercel Preview (smetalabv3-timeweb)
    needs: [ci]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    environment:
      name: preview
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8
      - name: Create Neon preview branch
        id: get_neon_branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}-${{ steps.branch_name.outputs.current_branch }}
          username: neondb_owner
          database: neondb
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy preview
        id: deploy_preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ steps.get_neon_branch.outputs.db_url_with_pooler }}
          POSTGRES_URL: ${{ steps.get_neon_branch.outputs.db_url_with_pooler }}
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          NEON_DB_URL="${{ steps.get_neon_branch.outputs.db_url_with_pooler }}"
          vercel pull --yes --environment preview --git-branch "$BRANCH_NAME" --token="$VERCEL_TOKEN"
          DATABASE_URL="$NEON_DB_URL" pnpm db:migrate
          DATABASE_URL="$NEON_DB_URL" pnpm db:seed:permissions
          mkdir -p .vercel
          printf "DATABASE_URL=%s\nPOSTGRES_URL=%s\n" "$NEON_DB_URL" "$NEON_DB_URL" >> .vercel/.env.preview.local
          vercel build --target preview --token="$VERCEL_TOKEN"
          deploy_output=$(vercel deploy --prebuilt --target preview -e DATABASE_URL="$NEON_DB_URL" -e POSTGRES_URL="$NEON_DB_URL" --token="$VERCEL_TOKEN" 2>&1)
          echo "$deploy_output"
          PREVIEW_URL=$(echo "$deploy_output" | awk '/^Preview: https:\/\// {print $2}' | tail -n 1)
          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL=$(echo "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.vercel\.app' | tail -n 1)
          fi
          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to parse preview URL from Vercel deploy output"
            exit 1
          fi
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const previewUrl = `${{ steps.deploy_preview.outputs.preview_url }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `✅ Vercel Preview (smetalabv3-timeweb) готово: ${previewUrl}`,
            });

  migrate-production:
    name: Run Production Migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull production env
        run: vercel pull --yes --environment production --token="$VERCEL_TOKEN"
      - name: Run database migrations
        run: |
          set -euo pipefail
          if [ ! -f .vercel/.env.production.local ]; then
            echo "Missing .vercel/.env.production.local after vercel pull."
            exit 1
          fi
          set -a
          . .vercel/.env.production.local
          set +a
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL is not defined in Vercel production environment."
            exit 1
          fi
          pnpm db:migrate:prod

  deploy-production:
    name: Deploy to Vercel Production (smetalabv3-timeweb)
    needs: [migrate-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://smetalabv3-timeweb.vercel.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

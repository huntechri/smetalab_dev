name: UI Inventory Audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-inventory-audit:
    name: pnpm audit:ui-inventory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run UI inventory audit
        run: pnpm audit:ui-inventory

      - name: Publish UI inventory report
        if: always()
        run: |
          cat reports/ui-inventory.md
          cat reports/ui-inventory.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload UI inventory reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-inventory-${{ github.run_number }}
          path: |
            reports/ui-inventory.md
            reports/ui-inventory.json
          if-no-files-found: error
          retention-days: 14

# Temporary workflow: remove after pnpm-lock.yaml is repaired.
name: Repair pnpm lockfile

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/repair-pnpm-lock.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.28.0 --activate

      - name: Pre-clean duplicate top-level lockfile keys
        shell: python
        run: |
          from pathlib import Path

          path = Path('pnpm-lock.yaml')
          text = path.read_text()
          lines = text.splitlines(keepends=True)

          section_headers = {'importers:', 'packages:', 'snapshots:'}
          dedupe_sections = {'packages:', 'snapshots:'}
          out = []
          i = 0
          current_section = None
          seen_by_section = {name: set() for name in dedupe_sections}
          removed = []

          while i < len(lines):
              line = lines[i]
              stripped = line.strip()

              if line and not line.startswith(' ') and stripped in section_headers:
                  current_section = stripped
                  out.append(line)
                  i += 1
                  continue

              is_top_level_entry = (
                  current_section in dedupe_sections
                  and line.startswith('  ')
                  and not line.startswith('    ')
                  and stripped.endswith(':')
                  and stripped != ''
              )

              if is_top_level_entry:
                  key = stripped[:-1]
                  if key in seen_by_section[current_section]:
                      removed.append(f'{current_section} {key}')
                      i += 1
                      while i < len(lines):
                          nxt = lines[i]
                          nxt_stripped = nxt.strip()
                          next_section = nxt and not nxt.startswith(' ') and nxt_stripped in section_headers
                          next_top_level_entry = (
                              current_section in dedupe_sections
                              and nxt.startswith('  ')
                              and not nxt.startswith('    ')
                              and nxt_stripped.endswith(':')
                              and nxt_stripped != ''
                          )
                          if next_section or next_top_level_entry:
                              break
                          i += 1
                      continue

                  seen_by_section[current_section].add(key)

              out.append(line)
              i += 1

          path.write_text(''.join(out))
          print('Removed duplicate entries:')
          for item in removed:
              print(f'- {item}')

      - name: Regenerate lockfile
        run: pnpm install --lockfile-only

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile

      - name: Commit repaired lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "No pnpm-lock.yaml changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "fix: repair pnpm lockfile"
          git push

name: Scheduled Branch Protection Check

# Periodically verifies that branch protection rules are still active.
# If a ruleset is disabled or deleted through the GitHub UI, this workflow
# catches the regression and opens a GitHub issue to alert the team.
#
# ─── Configuring the check frequency ────────────────────────────────────────
# The workflow trigger runs every hour. An early gate job reads the repository
# variable BRANCH_PROTECTION_CHECK_CRON and only lets the checks proceed when
# the current UTC time matches that cron expression.
#
# To change how often the check runs, set the repository variable
# BRANCH_PROTECTION_CHECK_CRON in:
#   Settings → Secrets and variables → Actions → Variables → New repository variable
#
# Common values
#   (unset)       — falls back to the default: "0 8 * * *"  (daily at 08:00 UTC)
#   0 8 * * *     — daily at 08:00 UTC            (default)
#   0 * * * *     — every hour                    (high-security environments)
#   0 8 * * 1     — weekly, Monday at 08:00 UTC   (low-activity organisations)
#   0 8 1 * *     — monthly, 1st of the month at 08:00 UTC
#
# The value must be a valid 5-field cron expression (minute hour day month weekday).
# GitHub Actions cron syntax reference:
#   https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#schedule
# ─────────────────────────────────────────────────────────────────────────────
#
# Triggers:
#   schedule          — every hour at :00 UTC; the check-schedule gate decides
#                       whether the checks actually run based on the configured
#                       BRANCH_PROTECTION_CHECK_CRON variable
#   workflow_dispatch — manual run (skips the schedule gate and always runs)
#
# Required secrets:
#   BRANCH_PROTECTION_TOKEN — a PAT or fine-grained token with:
#       - "repo" scope  (read repo-level rulesets)
#       - "admin:org" scope  (read org-level rulesets)
#     Falls back to GITHUB_TOKEN for the repo check when the secret is absent,
#     but the org check requires an explicit token with admin:org scope.
#
# Optional secrets:
#   SLACK_WEBHOOK_URL — an Incoming Webhook URL for a Slack channel.
#     When set, a Slack message is posted on failure with links to the alert
#     issue and the failing Actions run. If the secret is absent the step is
#     silently skipped so the workflow still works for repos without Slack.
#
# The workflow opens a single GitHub issue titled
# "Branch protection regression detected" when checks fail, and avoids
# duplicate issues by searching for an existing open issue with the same title
# before creating a new one.

on:
  schedule:
    # Runs every hour so that any BRANCH_PROTECTION_CHECK_CRON value (including
    # hourly) can be honoured without editing this file.
    # The check-schedule job gates actual execution according to the variable.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  # ── Schedule gate ──────────────────────────────────────────────────────────
  # Reads the BRANCH_PROTECTION_CHECK_CRON repository variable and decides
  # whether this particular hourly trigger should proceed.
  #
  # workflow_dispatch runs always skip this gate (should_run is forced to true).
  check-schedule:
    name: Check configured schedule
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: none
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}

    steps:
      - name: Evaluate schedule gate
        id: gate
        env:
          # Default: daily at 08:00 UTC — same behaviour as the original hard-coded schedule.
          # Override by setting the BRANCH_PROTECTION_CHECK_CRON repository variable.
          CONFIGURED_CRON: ${{ vars.BRANCH_PROTECTION_CHECK_CRON || '0 8 * * *' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Manual dispatches always run regardless of the configured schedule.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping schedule gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Configured cron: ${CONFIGURED_CRON}"

          # Install croniter for reliable cron evaluation.
          pip install --quiet croniter

          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta
          from croniter import croniter

          cron_expr = os.environ["CONFIGURED_CRON"].strip()
          now = datetime.now(timezone.utc).replace(second=0, microsecond=0)

          # The trigger fires once per hour.  To account for the scheduler jitter
          # that is common in GitHub Actions (jobs often start several minutes
          # after the nominal cron boundary), we look back 61 minutes — slightly
          # more than the trigger period.  croniter.get_next is exclusive of its
          # start_time, so the extra minute ensures that a match occurring exactly
          # 60 minutes ago (extreme-delay edge case) is still captured.  If the
          # configured cron expression had any scheduled occurrence inside
          # [now-61min, now], this run should proceed.
          window_start = now - timedelta(minutes=61)

          fallback = False
          try:
              itr = croniter(cron_expr, start_time=window_start)
              next_in_window = itr.get_next(datetime)
          except Exception as e:
              print(f"::error::Invalid BRANCH_PROTECTION_CHECK_CRON value '{cron_expr}': {e}")
              print("Falling back to default schedule '0 8 * * *'.")
              itr = croniter("0 8 * * *", start_time=window_start)
              next_in_window = itr.get_next(datetime)
              fallback = True

          should_run = next_in_window <= now

          expr_used = "0 8 * * * (fallback)" if fallback else cron_expr
          print(f"Configured cron  : {expr_used}")
          print(f"Lookback window  : {window_start.strftime('%H:%M')}–{now.strftime('%H:%M')} UTC")
          print(f"Next match at/after window start: {next_in_window.strftime('%Y-%m-%d %H:%M')} UTC")
          if should_run:
              print("Match found within window — proceeding with checks.")
          else:
              print("No match within window — skipping this run.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
          PYEOF

  # ── Repo-level check ───────────────────────────────────────────────────────
  verify-repo-protection:
    name: Verify repo branch protection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-schedule]
    if: needs.check-schedule.outputs.should_run == 'true'
    permissions:
      contents: read
      issues: write
    outputs:
      repo_passed: ${{ steps.verify.outputs.passed }}
      repo_summary: ${{ steps.verify.outputs.summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify repo-level branch protection
        id: verify
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          chmod +x ./scripts/verify-branch-protection.sh
          if OUTPUT=$(./scripts/verify-branch-protection.sh "${OWNER}/${REPO}" 2>&1); then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "summary=Repo branch protection check passed." >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            # Truncate to avoid exceeding GitHub output size limits
            SUMMARY=$(echo "$OUTPUT" | tail -40)
            {
              echo "summary<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "$OUTPUT"
            exit 0  # Do not fail the step; failure is handled by the alert job
          fi

  # ── Org-level check ────────────────────────────────────────────────────────
  verify-org-protection:
    name: Verify org branch protection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-schedule]
    if: needs.check-schedule.outputs.should_run == 'true'
    permissions:
      contents: read
      issues: write
    outputs:
      org_passed: ${{ steps.verify.outputs.passed }}
      org_summary: ${{ steps.verify.outputs.summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify org-level branch protection
        id: verify
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "summary=BRANCH_PROTECTION_TOKEN secret is not configured; org-level check skipped." >> "$GITHUB_OUTPUT"
            echo "::notice::BRANCH_PROTECTION_TOKEN is not set — org-level branch protection check skipped. Set the secret with admin:org scope to enable this check."
            exit 0
          fi
          chmod +x ./scripts/verify-org-branch-protection.sh
          if OUTPUT=$(./scripts/verify-org-branch-protection.sh "${ORG}" 2>&1); then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "summary=Org branch protection check passed." >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            SUMMARY=$(echo "$OUTPUT" | tail -40)
            {
              echo "summary<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "$OUTPUT"
            exit 0
          fi

  # ── Alert ──────────────────────────────────────────────────────────────────
  alert-on-failure:
    name: Open issue if checks failed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [verify-repo-protection, verify-org-protection]
    if: >
      needs.verify-repo-protection.outputs.repo_passed == 'false' ||
      needs.verify-org-protection.outputs.org_passed == 'false'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Build issue body
        id: build-body
        env:
          REPO_PASSED: ${{ needs.verify-repo-protection.outputs.repo_passed }}
          REPO_SUMMARY: ${{ needs.verify-repo-protection.outputs.repo_summary }}
          ORG_PASSED: ${{ needs.verify-org-protection.outputs.org_passed }}
          ORG_SUMMARY: ${{ needs.verify-org-protection.outputs.org_summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "body<<EOF"
            echo "## Branch protection regression detected"
            echo ""
            echo "The scheduled branch protection check found one or more failures."
            echo "**Workflow run:** ${RUN_URL}"
            echo ""
            if [ "$REPO_PASSED" = "false" ]; then
              echo "### Repo-level check FAILED"
              echo ""
              echo '```'
              echo "${REPO_SUMMARY}"
              echo '```'
              echo ""
            fi
            if [ "$ORG_PASSED" = "false" ]; then
              echo "### Org-level check FAILED"
              echo ""
              echo '```'
              echo "${ORG_SUMMARY}"
              echo '```'
              echo ""
            fi
            echo "### Remediation"
            echo ""
            echo "- Re-run \`scripts/setup-branch-protection.sh\` to restore repo-level rulesets."
            echo "- Re-run \`scripts/setup-org-branch-protection.sh\` to restore org-level rulesets."
            echo "- Trigger **Setup Branch Protection** or **Verify Org Branch Protection**"
            echo "  workflows manually from the Actions tab once remediation is complete."
            echo ""
            echo "_This issue was opened automatically by the Scheduled Branch Protection Check workflow._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing open alert issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "Branch protection regression detected in:title" \
            --json number \
            --jq '.[0].number // ""')
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "An open alert issue already exists: #${ISSUE_NUMBER}"
          else
            echo "No existing open alert issue found; a new one will be created."
          fi

      - name: Create alert issue
        id: create-issue
        if: steps.existing.outputs.issue_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BODY: ${{ steps.build-body.outputs.body }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "Branch protection regression detected" \
            --label "security,ci" \
            --body "$BODY") || \
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "Branch protection regression detected" \
            --body "$BODY")
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"

      - name: Add comment to existing alert issue
        if: steps.existing.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.issue_number }}
          BODY: ${{ steps.build-body.outputs.body }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "$BODY"

      - name: Resolve issue URL for Slack notification
        id: issue-url
        env:
          EXISTING_NUMBER: ${{ steps.existing.outputs.issue_number }}
          CREATED_URL: ${{ steps.create-issue.outputs.issue_url }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$CREATED_URL" ]; then
            echo "issue_url=${CREATED_URL}" >> "$GITHUB_OUTPUT"
          elif [ -n "$EXISTING_NUMBER" ]; then
            echo "issue_url=${SERVER_URL}/${REPO}/issues/${EXISTING_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_url=${SERVER_URL}/${REPO}/issues" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ISSUE_URL: ${{ steps.issue-url.outputs.issue_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not set — skipping Slack notification."
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":warning: *Branch protection regression detected* in \`${REPO}\`\nOne or more branch protection rules are missing or misconfigured.\n\u2022 *Alert issue:* ${ISSUE_URL}\n\u2022 *Workflow run:* ${RUN_URL}\"
            }")
          echo "Slack webhook response status: ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Slack notification failed with HTTP status ${HTTP_STATUS}."
          fi

      - name: Fail the workflow to surface regression in Actions UI
        run: |
          echo "Branch protection regression detected. See the alert issue for details." >&2
          exit 1

  # ── Auto-close ─────────────────────────────────────────────────────────────
  close-issue-on-success:
    name: Close alert issue if protection is restored
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [verify-repo-protection, verify-org-protection]
    if: >
      needs.verify-repo-protection.outputs.repo_passed == 'true' &&
      needs.verify-org-protection.outputs.org_passed == 'true'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Search for open alert issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "Branch protection regression detected in:title" \
            --json number \
            --jq '.[0].number // ""')
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "Found open alert issue #${ISSUE_NUMBER} — will close it."
          else
            echo "No open alert issue found; nothing to close."
          fi

      - name: Comment and close alert issue
        if: steps.existing.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "## Branch protection verified

All scheduled branch protection checks passed in the latest run.

**Workflow run:** ${RUN_URL}

Both repo-level and org-level rules are present and correctly enforced. Closing this issue automatically.

_This comment was added automatically by the Scheduled Branch Protection Check workflow._"

          gh issue close "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --reason "completed"

          echo "Closed alert issue #${ISSUE_NUMBER} — branch protection has been restored."

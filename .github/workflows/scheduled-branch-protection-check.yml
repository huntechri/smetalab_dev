name: Scheduled Branch Protection Check

# Periodically verifies that the repo-level main-protection ruleset is active.
# This repository is under a personal GitHub account, so this workflow does not
# check or manage organization-level rulesets.
#
# Schedule control:
#   The workflow trigger runs every hour, then a gate job checks the optional
#   BRANCH_PROTECTION_CHECK_CRON repository variable.
#
# Common BRANCH_PROTECTION_CHECK_CRON values:
#   (unset)       — defaults to "0 8 * * *"  (daily at 08:00 UTC)
#   0 8 * * *     — daily at 08:00 UTC
#   0 * * * *     — every hour
#   0 8 * * 1     — weekly, Monday at 08:00 UTC
#   0 8 1 * *     — monthly, 1st of the month at 08:00 UTC
#
# Optional secrets:
#   SLACK_WEBHOOK_URL — Incoming Webhook URL for Slack failure notifications.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-schedule:
    name: Check configured schedule
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: none
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}

    steps:
      - name: Evaluate schedule gate
        id: gate
        env:
          CONFIGURED_CRON: ${{ vars.BRANCH_PROTECTION_CHECK_CRON || '0 8 * * *' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping schedule gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Configured cron: ${CONFIGURED_CRON}"
          pip install --quiet croniter

          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta
          from croniter import croniter

          cron_expr = os.environ["CONFIGURED_CRON"].strip()
          now = datetime.now(timezone.utc).replace(second=0, microsecond=0)
          window_start = now - timedelta(minutes=61)

          fallback = False
          try:
              itr = croniter(cron_expr, start_time=window_start)
              next_in_window = itr.get_next(datetime)
          except Exception as e:
              print(f"::error::Invalid BRANCH_PROTECTION_CHECK_CRON value '{cron_expr}': {e}")
              print("Falling back to default schedule '0 8 * * *'.")
              itr = croniter("0 8 * * *", start_time=window_start)
              next_in_window = itr.get_next(datetime)
              fallback = True

          should_run = next_in_window <= now
          expr_used = "0 8 * * * (fallback)" if fallback else cron_expr

          print(f"Configured cron: {expr_used}")
          print(f"Lookback window: {window_start.strftime('%H:%M')}–{now.strftime('%H:%M')} UTC")
          print(f"Next match at/after window start: {next_in_window.strftime('%Y-%m-%d %H:%M')} UTC")
          print("Match found within window — proceeding with checks." if should_run else "No match within window — skipping this run.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
          PYEOF

  verify-repo-protection:
    name: Verify repo branch protection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-schedule]
    if: needs.check-schedule.outputs.should_run == 'true'
    permissions:
      contents: read
      issues: write
    outputs:
      repo_passed: ${{ steps.verify.outputs.passed }}
      repo_summary: ${{ steps.verify.outputs.summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify repo-level branch protection
        id: verify
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          chmod +x ./scripts/verify-branch-protection.sh
          if OUTPUT=$(./scripts/verify-branch-protection.sh "${OWNER}/${REPO}" 2>&1); then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "summary=Repo branch protection check passed." >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            SUMMARY=$(echo "$OUTPUT" | tail -40)
            {
              echo "summary<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "$OUTPUT"
            exit 0
          fi

  alert-on-failure:
    name: Open issue if checks failed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [verify-repo-protection]
    if: needs.verify-repo-protection.outputs.repo_passed == 'false'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Build issue body
        id: build-body
        env:
          REPO_SUMMARY: ${{ needs.verify-repo-protection.outputs.repo_summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "body<<EOF"
            echo "## Branch protection regression detected"
            echo ""
            echo "The scheduled repo-level branch protection check failed."
            echo "**Workflow run:** ${RUN_URL}"
            echo ""
            echo "### Repo-level check FAILED"
            echo ""
            echo '```'
            echo "${REPO_SUMMARY}"
            echo '```'
            echo ""
            echo "### Remediation"
            echo ""
            echo "- Re-run \`scripts/setup-branch-protection.sh\` to restore repo-level rulesets."
            echo "- Trigger **Setup Branch Protection** manually from the Actions tab once remediation is complete."
            echo ""
            echo "_This issue was opened automatically by the Scheduled Branch Protection Check workflow._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing open alert issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "Branch protection regression detected in:title" \
            --json number \
            --jq '.[0].number // ""')
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create alert issue
        id: create-issue
        if: steps.existing.outputs.issue_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BODY: ${{ steps.build-body.outputs.body }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "Branch protection regression detected" \
            --label "security,ci" \
            --body "$BODY") || \
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "Branch protection regression detected" \
            --body "$BODY")
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"

      - name: Add comment to existing alert issue
        if: steps.existing.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.issue_number }}
          BODY: ${{ steps.build-body.outputs.body }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "$BODY"

      - name: Resolve issue URL for Slack notification
        id: issue-url
        env:
          EXISTING_NUMBER: ${{ steps.existing.outputs.issue_number }}
          CREATED_URL: ${{ steps.create-issue.outputs.issue_url }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$CREATED_URL" ]; then
            echo "issue_url=${CREATED_URL}" >> "$GITHUB_OUTPUT"
          elif [ -n "$EXISTING_NUMBER" ]; then
            echo "issue_url=${SERVER_URL}/${REPO}/issues/${EXISTING_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_url=${SERVER_URL}/${REPO}/issues" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ISSUE_URL: ${{ steps.issue-url.outputs.issue_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not set — skipping Slack notification."
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":warning: *Branch protection regression detected* in \`${REPO}\`\nRepo-level branch protection is missing or misconfigured.\n\u2022 *Alert issue:* ${ISSUE_URL}\n\u2022 *Workflow run:* ${RUN_URL}\"
            }")
          echo "Slack webhook response status: ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Slack notification failed with HTTP status ${HTTP_STATUS}."
          fi

      - name: Fail the workflow to surface regression in Actions UI
        run: |
          echo "Branch protection regression detected. See the alert issue for details." >&2
          exit 1

  close-issue-on-success:
    name: Close alert issue if protection is restored
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [verify-repo-protection]
    if: needs.verify-repo-protection.outputs.repo_passed == 'true'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Search for open alert issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --search "Branch protection regression detected in:title" \
            --json number \
            --jq '.[0].number // ""')
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Comment and close alert issue
        if: steps.existing.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "## Branch protection verified

The scheduled repo-level branch protection check passed in the latest run.

**Workflow run:** ${RUN_URL}

The repo-level main-protection ruleset is present and enforced. Closing this issue automatically.

_This comment was added automatically by the Scheduled Branch Protection Check workflow._"

          gh issue close "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --reason "completed"

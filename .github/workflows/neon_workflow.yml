name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"

      - name: Seed Permissions
        run: pnpm db:seed:permissions
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"

      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Set Vercel branch-specific DATABASE_URL via API
        run: |
          NEON_DB_URL="${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
          BRANCH_NAME="${{ needs.setup.outputs.branch }}"
          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # Функция: устанавливает или обновляет env-переменную для конкретной ветки
          set_vercel_env() {
            local KEY="$1"
            local VALUE="$2"

            # Ищем уже существующую запись для этой ветки
            EXISTING_ID=$(curl -sf \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?gitBranch=${BRANCH_NAME}" \
              -H "Authorization: Bearer ${TOKEN}" \
              | jq -r --arg key "$KEY" '.envs[] | select(.key == $key) | .id // empty' 2>/dev/null || true)

            if [ -n "$EXISTING_ID" ]; then
              curl -sf -X PATCH \
                "https://api.vercel.com/v10/projects/${PROJECT_ID}/env/${EXISTING_ID}" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"value\": \"${VALUE}\"}" > /dev/null
              echo "Updated ${KEY} for branch ${BRANCH_NAME}"
            else
              curl -sf -X POST \
                "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"key\": \"${KEY}\", \"value\": \"${VALUE}\", \"type\": \"encrypted\", \"target\": [\"preview\"], \"gitBranch\": \"${BRANCH_NAME}\"}" > /dev/null
              echo "Created ${KEY} for branch ${BRANCH_NAME}"
            fi
          }

          set_vercel_env "DATABASE_URL" "$NEON_DB_URL"
          set_vercel_env "POSTGRES_URL" "$NEON_DB_URL"

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete branch-specific Vercel env vars
        run: |
          BRANCH_NAME="${{ needs.setup.outputs.branch }}"
          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          delete_vercel_env() {
            local KEY="$1"
            EXISTING_ID=$(curl -sf \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?gitBranch=${BRANCH_NAME}" \
              -H "Authorization: Bearer ${TOKEN}" \
              | jq -r --arg key "$KEY" '.envs[] | select(.key == $key) | .id // empty' 2>/dev/null || true)

            if [ -n "$EXISTING_ID" ]; then
              curl -sf -X DELETE \
                "https://api.vercel.com/v10/projects/${PROJECT_ID}/env/${EXISTING_ID}" \
                -H "Authorization: Bearer ${TOKEN}" > /dev/null
              echo "Deleted ${KEY} for branch ${BRANCH_NAME}"
            else
              echo "${KEY} not found for branch ${BRANCH_NAME}, skipping"
            fi
          }

          delete_vercel_env "DATABASE_URL"
          delete_vercel_env "POSTGRES_URL"

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'falling-fire-63341326' }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
